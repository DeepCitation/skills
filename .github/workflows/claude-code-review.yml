name: Claude Code Review

on:
  pull_request:
    types: [opened]
    # Only auto-review when the PR is first opened.
    # For follow-up reviews after fix commits, post "@claude review the latest changes"
    # in a PR comment — the claude.yml workflow will handle it.
    # This avoids re-reviewing every pushed fix commit (noisy, expensive).
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

jobs:
  claude-review:
    # Only run for PRs from the same repo (not forks) to prevent prompt injection
    # via crafted diffs from untrusted contributors.
    # Skip Dependabot PRs since they only update dependencies.
    if: |
      github.actor != 'dependabot[bot]' && (
        github.event_name == 'workflow_dispatch' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@33ea56dd1072951fc382b7bffdb52125f2994e68 # v1.0.82
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: >-
            --model claude-sonnet-4-6
            --allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Glob,Read"

      - name: Upload Claude prompt for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-prompt
          path: /home/runner/work/_temp/claude-prompts/claude-prompt.txt
          if-no-files-found: warn
