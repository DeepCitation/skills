name: Package Verify Skill

on:
  push:
    branches: [main]
    paths:
      - "skills/verify/**"
      - ".github/workflows/package-verify.yml"

permissions:
  contents: write

jobs:
  package:
    name: Build and release verify.zip
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build verify.zip
        run: cd skills/verify && zip -r ../../verify.zip SKILL.md rules/auth.md

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="verify-latest"

          # Delete existing release if present (update in place)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin --delete "$TAG" 2>/dev/null || true

          gh release create "$TAG" verify.zip \
            --title "verify skill (latest)" \
            --notes "Auto-built from \`skills/verify/\` at ${{ steps.sha.outputs.short }}.

          Download \`verify.zip\` and upload it at [claude.ai/customize/skills](https://claude.ai/customize/skills)." \
            --latest
